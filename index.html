<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id'); // 예: 'day', 'night', 'intro' 등

        // 2. id 파라미터가 실제로 주소창에 존재할 때만 작동
        if (idParam) {
            // 주소창 뒷부분(?id=...)을 떼어낸 순수 URL 경로 확보
            let pureUrl = window.location.href.split('?')[0];
            const targetFile = encodeURIComponent(idParam) + '.html'; 

            if (pureUrl.endsWith('index.html')) {
                window.location.href = pureUrl.replace('index.html', targetFile);
            } else {
                if (pureUrl.endsWith('/')) {
                    window.location.href = pureUrl + targetFile;
                } else {
                    window.location.href = pureUrl + '/' + targetFile;
                }
            }
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Tourism Tri-Fold Brochure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Enforce strict A4 Landscape Proportions (297:210) */
        .a4-landscape {
            aspect-ratio: 297 / 210;
            width: 100%;
            max-width: 1200px;
        }

        /* Custom Earthy Palette */
        .bg-rural-green { background-color: #2D4A3E; }
        .text-rural-green { color: #2D4A3E; }
        .bg-rural-ochre { background-color: #D4A373; }
        .bg-rural-clay { background-color: #E6CCB2; }
        .bg-rural-cream { background-color: #FAEDCD; }

        /* Fold line simulations for preview */
        .fold-line-left { border-right: 1px dashed rgba(0,0,0,0.15); }
        .fold-line-right { border-left: 1px dashed rgba(0,0,0,0.15); }
        
        /* Specific panel flex percentages to match the folder closure specs */
        [class^="outside-"], [class^="inside-"] { width: 33.33%; }   /* 100mm */
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center gap-8 text-3xl">

    <div class="w-full max-w-5xl flex justify-between items-center bg-white p-4 rounded-xl shadow-sm">
        <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Brochure Preview System</span>
        <div class="flex gap-2">
            <button onclick="switchLanguage('en')" id="btn-en" class="px-4 py-2 rounded-lg text-sm font-bold bg-rural-green text-white shadow-sm transition-all">English</button>
            <button onclick="switchLanguage('ko')" id="btn-ko" class="px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-700 transition-all">한국어</button>
        </div>
    </div>

    <div class="w-full flex flex-col items-center gap-2">
        <h2 class="text-xs font-bold text-gray-400 tracking-widest uppercase self-start max-w-5xl w-full mx-auto px-4">Spread 1: Outside View</h2>
        <div class="a4-landscape bg-white shadow-2xl rounded-sm overflow-hidden flex relative">
            <div id="comp-booking" class="outside-left bg-rural-cream p-6 flex flex-col justify-between fold-line-left"></div>
            
            <div id="comp-back-cover" class="outside-center bg-white p-6 flex flex-col justify-between"></div>
            
            <div id="comp-front-cover" class="outside-right relative text-white flex flex-col justify-center gap-3 p-6 fold-line-right bg-cover bg-center" style="background-image: linear-gradient(to bottom, rgba(45,74,62,0.3), rgba(45,74,62,0.85)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=600&q=80')"></div>
        </div>
    </div>

    <div class="w-full flex flex-col items-center gap-2 mt-8">
        <h2 class="text-xs font-bold text-gray-400 tracking-widest uppercase self-start max-w-5xl w-full mx-auto px-4">Spread 2: Inside View</h2>
        <div class="a4-landscape bg-white shadow-2xl rounded-sm overflow-hidden flex">
            <div id="comp-tour-1" class="inside-left p-6 bg-slate-50 flex flex-col justify-between fold-line-left"></div>
            
            <div id="comp-gallery" class="inside-center p-5 bg-white flex flex-col justify-between"></div>
            
            <div id="comp-tour-2" class="inside-right p-6 bg-amber-50/40 flex flex-col justify-between fold-line-right"></div>
        </div>
    </div>

    <script>
        

        // Language Switch Controller
        function switchLanguage(lang) {
            currentLang = lang;
            
            // Toggle active button stylings
            document.getElementById('btn-en').className = lang === 'en' ? 'px-4 py-2 rounded-lg text-sm font-bold bg-rural-green text-white shadow-sm transition-all' : 'px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-700 transition-all';
            document.getElementById('btn-ko').className = lang === 'ko' ? 'px-4 py-2 rounded-lg text-sm font-bold bg-rural-green text-white shadow-sm transition-all' : 'px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-700 transition-all';
            
            renderBrochure();
        }
    </script>
</body>
</html>
